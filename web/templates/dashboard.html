<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraud Detection Demo</title>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1419;
      color: #e7e9ea;
      min-height: 100vh;
    }

    /* Header */
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #2f3336;
      background: #16181c;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header p { font-size: 0.85rem; color: #8b98a5; margin-top: 4px; }

    /* Layout */
    .container { display: flex; height: calc(100vh - 80px); }
    .sidebar {
      width: 340px;
      padding: 16px;
      border-right: 1px solid #2f3336;
      overflow-y: auto;
      background: #16181c;
    }
    .main { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

    /* Buttons & inputs */
    .btn {
      display: inline-block;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
      width: 100%;
      margin-bottom: 8px;
    }
    .btn-primary { background: #1d9bf0; color: white; }
    .btn-primary:hover { background: #1a8cd8; }
    .btn-secondary { background: #2f3336; color: #e7e9ea; }
    .btn-secondary:hover { background: #3a3d41; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    input[type="file"] {
      width: 100%;
      padding: 8px;
      background: #1e2328;
      border: 1px dashed #536471;
      border-radius: 8px;
      color: #e7e9ea;
      margin-bottom: 8px;
    }

    /* Sections */
    .section {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2f3336;
    }
    .section h3 {
      font-size: 0.9rem;
      color: #8b98a5;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Stats */
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat {
      background: #1e2328;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    .stat .value { font-size: 1.3rem; font-weight: 700; }
    .stat .label { font-size: 0.75rem; color: #8b98a5; margin-top: 2px; }
    .stat.fraud .value { color: #e74c3c; }
    .stat.good .value { color: #2ecc71; }
    .stat.warn .value { color: #f39c12; }
    .stat.info .value { color: #3498db; }

    /* Threshold slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .slider-row input[type="range"] { flex: 1; }
    .slider-row .val { font-weight: 600; min-width: 40px; }

    /* Table */
    .txn-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .txn-table th {
      background: #1e2328;
      padding: 6px 8px;
      text-align: left;
      color: #8b98a5;
      position: sticky;
      top: 0;
    }
    .txn-table td { padding: 5px 8px; border-bottom: 1px solid #2f3336; }
    .txn-table tr:hover { background: #1e2328; }
    .tag-fraud { color: #e74c3c; font-weight: 600; }
    .tag-legit { color: #2ecc71; }

    /* Graph */
    #graph-container { flex: 1; background: #0f1419; min-height: 0; overflow: hidden; }

    /* View buttons */
    .view-btns { display: flex; gap: 6px; padding: 8px 12px; background: #16181c; border-bottom: 1px solid #2f3336; }
    .view-btn {
      padding: 6px 12px;
      border: 1px solid #536471;
      border-radius: 16px;
      background: none;
      color: #e7e9ea;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .view-btn.active { background: #1d9bf0; border-color: #1d9bf0; }
    .view-btn:hover { border-color: #1d9bf0; }

    /* Legend */
    .legend { display: flex; gap: 12px; padding: 8px 12px; font-size: 0.8rem; }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }

    /* Status */
    #status {
      padding: 8px 12px;
      font-size: 0.85rem;
      color: #8b98a5;
    }

    /* Loading */
    .loading { text-align: center; padding: 20px; color: #8b98a5; }
  </style>
</head>
<body>
  <header>
    <h1>Fraud Detection — Interactive Demo</h1>
    <p>Hybrid GAT+VAE model. Upload CSV or load existing graph to see fraud predictions.</p>
  </header>

  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">

      <!-- Data Loading -->
      <div class="section">
        <h3>1. Load Data</h3>
        <button class="btn btn-primary" onclick="loadExisting()">Load Pre-built Graph</button>
        <p style="text-align:center; font-size:0.8rem; color:#536471; margin: 4px 0;">or</p>
        <input type="file" id="csv-file" accept=".csv">
        <button class="btn btn-secondary" onclick="uploadCSV()">Upload CSV</button>
      </div>

      <!-- Stats -->
      <div class="section" id="stats-section" style="display:none">
        <h3>2. Results</h3>
        <div class="slider-row">
          <span style="font-size:0.8rem">Threshold:</span>
          <input type="range" id="threshold" min="0.05" max="0.95" step="0.05" value="0.50"
                 oninput="updateThreshold(this.value)">
          <span class="val" id="thresh-val">0.50</span>
        </div>
        <div class="stats" id="stats-grid">
          <!-- filled by JS -->
        </div>
      </div>

      <!-- XGBoost vs Hybrid Comparison -->
      <div class="section" id="comparison-section" style="display:none">
        <h3>3. XGBoost vs Hybrid GNN</h3>
        <div id="comparison-grid" class="stats"></div>
        <div id="comparison-table" style="max-height: 180px; overflow-y: auto; margin-top: 8px;"></div>
      </div>

      <!-- Top Transactions Table -->
      <div class="section" id="table-section" style="display:none">
        <h3>4. Top Flagged Transactions</h3>
        <div style="max-height: 200px; overflow-y: auto;">
          <table class="txn-table">
            <thead><tr><th>#</th><th>Score</th><th>Actual</th></tr></thead>
            <tbody id="txn-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Main area -->
    <div class="main">
      <div class="view-btns">
        <button class="view-btn active" data-mode="top_fraud" onclick="switchView(this)">Top Fraud</button>
        <button class="view-btn" data-mode="flagged" onclick="switchView(this)">All Flagged</button>
        <button class="view-btn" data-mode="missed" onclick="switchView(this)">Missed (FN)</button>
        <button class="view-btn" data-mode="only_hybrid" onclick="switchView(this)" style="border-color:#e74c3c; color:#e74c3c;">Only Hybrid Catches</button>
      </div>
      <div class="legend">
        <span><i class="dot" style="background:#e74c3c"></i> Fraud</span>
        <span><i class="dot" style="background:#3498db"></i> Legit</span>
        <span><i class="dot" style="background:#2ecc71"></i> Account</span>
        <span><i class="dot" style="background:#9b59b6"></i> Merchant</span>
      </div>
      <div id="status">Load data to begin.</div>
      <div id="graph-container"></div>
    </div>
  </div>

  <script>
    // Colors for node groups
    const COLORS = {
      fraud:       { background: '#c0392b', border: '#e74c3c' },
      transaction: { background: '#2874a6', border: '#3498db' },
      account:     { background: '#1e8449', border: '#2ecc71' },
      merchant:    { background: '#6c3483', border: '#9b59b6' },
    };

    let network = null;
    let currentMode = 'top_fraud';
    let currentThreshold = 0.5;

    // ── Load existing pre-built graph ──
    function loadExisting() {
      setStatus('Loading pre-built graph...');
      fetch('/load_existing', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
          if (data.error) { setStatus('Error: ' + data.error); return; }
          setStatus(`Loaded ${data.transactions.toLocaleString()} transactions.`);
          fetchResults();
          fetchComparison();
          fetchGraph();
        })
        .catch(e => setStatus('Error: ' + e.message));
    }

    // ── Upload CSV ──
    function uploadCSV() {
      const fileInput = document.getElementById('csv-file');
      if (!fileInput.files.length) { setStatus('Please select a CSV file.'); return; }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      setStatus('Uploading and processing...');
      fetch('/upload', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
          if (data.error) { setStatus('Error: ' + data.error); return; }
          setStatus(`Processed ${data.transactions.toLocaleString()} transactions (${data.dataset}).`);
          fetchResults();
          fetchComparison();
          fetchGraph();
        })
        .catch(e => setStatus('Error: ' + e.message));
    }

    // ── Fetch results with threshold ──
    function fetchResults() {
      fetch(`/results?threshold=${currentThreshold}`)
        .then(r => r.json())
        .then(data => {
          if (data.error) return;

          // Show stats
          document.getElementById('stats-section').style.display = '';
          document.getElementById('stats-grid').innerHTML = `
            <div class="stat info"><div class="value">${data.total.toLocaleString()}</div><div class="label">Total</div></div>
            <div class="stat fraud"><div class="value">${data.flagged.toLocaleString()}</div><div class="label">Flagged</div></div>
            <div class="stat good"><div class="value">${(data.precision * 100).toFixed(1)}%</div><div class="label">Precision</div></div>
            <div class="stat warn"><div class="value">${(data.recall * 100).toFixed(1)}%</div><div class="label">Recall</div></div>
            <div class="stat"><div class="value">${data.tp}</div><div class="label">True Pos</div></div>
            <div class="stat"><div class="value">${data.fp}</div><div class="label">False Pos</div></div>
            <div class="stat"><div class="value">${data.fn}</div><div class="label">False Neg</div></div>
            <div class="stat"><div class="value">${data.tn.toLocaleString()}</div><div class="label">True Neg</div></div>
          `;

          // Show table
          document.getElementById('table-section').style.display = '';
          const tbody = document.getElementById('txn-body');
          tbody.innerHTML = data.top_transactions.slice(0, 50).map(t => `
            <tr>
              <td>${t.index}</td>
              <td>${t.score.toFixed(3)}</td>
              <td class="${t.actual === 'FRAUD' ? 'tag-fraud' : 'tag-legit'}">${t.actual}</td>
            </tr>
          `).join('');
        });
    }

    // ── Fetch XGBoost vs Hybrid comparison ──
    function fetchComparison() {
      fetch(`/comparison?threshold=${currentThreshold}`)
        .then(r => r.json())
        .then(data => {
          if (data.error) return;

          document.getElementById('comparison-section').style.display = '';

          var total = data.total_fraud || 1;
          document.getElementById('comparison-grid').innerHTML = `
            <div class="stat good"><div class="value">${data.both_catch}</div><div class="label">Both Catch</div></div>
            <div class="stat info"><div class="value">${data.only_xgb}</div><div class="label">Only XGBoost</div></div>
            <div class="stat fraud"><div class="value">${data.only_hybrid}</div><div class="label">Only Hybrid</div></div>
            <div class="stat"><div class="value">${data.both_miss}</div><div class="label">Both Miss</div></div>
          `;

          // Show examples table for "only hybrid catches"
          if (data.only_hybrid_examples.length > 0) {
            document.getElementById('comparison-table').innerHTML = `
              <p style="font-size:0.75rem; color:#e74c3c; margin-bottom:4px;">
                Hybrid catches ${data.only_hybrid} fraud that XGBoost misses:
              </p>
              <table class="txn-table">
                <thead><tr><th>#</th><th>Hybrid</th><th>XGBoost</th></tr></thead>
                <tbody>${data.only_hybrid_examples.map(e => `
                  <tr>
                    <td>${e.index}</td>
                    <td class="tag-fraud">${e.hybrid_score.toFixed(3)}</td>
                    <td class="tag-legit">${e.xgb_score.toFixed(3)}</td>
                  </tr>`).join('')}
                </tbody>
              </table>`;
          } else {
            document.getElementById('comparison-table').innerHTML =
              '<p style="font-size:0.8rem; color:#8b98a5;">No fraud exclusively caught by Hybrid at this threshold.</p>';
          }
        });
    }

    // ── Fetch and render graph ──
    function fetchGraph() {
      setStatus('Loading graph...');
      fetch(`/graph?mode=${currentMode}&threshold=${currentThreshold}`)
        .then(r => r.json())
        .then(data => {
          if (data.error) { setStatus('Error: ' + data.error); return; }
          renderGraph(data);
          setStatus(`Showing ${data.nodes.length} nodes, ${data.edges.length} edges (${currentMode})`);
        });
    }

    function renderGraph(data) {
      const container = document.getElementById('graph-container');

      const nodes = data.nodes.map(n => ({
        id: n.id,
        label: n.label,
        title: n.title,
        color: COLORS[n.group] || COLORS.transaction,
        font: { color: '#fff', size: 14 },
        size: n.group === 'fraud' ? 25 : (n.group === 'account' || n.group === 'merchant') ? 20 : 15,
        shape: n.group === 'account' ? 'diamond' : n.group === 'merchant' ? 'square' : 'dot',
      }));

      const edges = data.edges.map((e, i) => ({
        id: 'e' + i,
        from: e.from,
        to: e.to,
        arrows: 'to',
        color: { color: '#536471', highlight: '#1d9bf0' },
      }));

      const options = {
        physics: {
          barnesHut: { gravitationalConstant: -3000, springLength: 80, springConstant: 0.04 },
          stabilization: { iterations: 200 },
        },
        interaction: { hover: true, tooltipDelay: 100 },
        edges: { smooth: { type: 'continuous' } },
      };

      if (network) network.destroy();
      network = new vis.Network(container, {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges),
      }, options);

      // Fit all nodes into view after physics stabilizes
      network.once('stabilized', function() {
        network.fit({ animation: false });
      });
    }

    // ── UI helpers ──
    function updateThreshold(val) {
      currentThreshold = parseFloat(val);
      document.getElementById('thresh-val').textContent = val;
      fetchResults();
      fetchComparison();
    }

    function switchView(btn) {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      fetchGraph();
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
